<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Heimdal — Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Philosopher:wght@700&display=swap" />

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1a1a2e" />
  <script type="module" src="./src/pwa.js"></script>

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Heimdal" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #1a1a2e;
      color: #f1f1f1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 { font-size: 2.8rem; margin: 0 0 4px; color: #e94560; font-family: 'Philosopher', serif; letter-spacing: 0.05em; }
    .subtitle { color: #aaa; margin: 0 0 32px; }
    form { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field-label { font-size: 0.875rem; color: #ccc; }
    .hint { font-size: 0.8rem; color: #888; }

    /* Token boxes — one real <input> drives all 16 visual .token-box
       cells; a single field (not 16 maxlength=1 boxes) so autofill/paste
       lands in one place instead of needing per-box distribution logic. */
    .token-input {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .token-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }
    .token-group {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    .token-box {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 1.1rem;
      font-weight: 600;
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f1f1f1;
    }
    .token-input.focused .token-box { border-color: #e94560; }
    .token-sep { color: #444; font-size: 1.5rem; font-weight: 300; }
    .token-input input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      /* Not opacity: 0 — iOS Safari disables the text-selection/paste UI
         on elements it considers fully transparent that way. */
      color: transparent;
      caret-color: transparent;
      border: 0;
      outline: none;
      margin: 0;
      padding: 0;
      background: transparent;
      font-size: 16px; /* prevents iOS auto-zoom on focus */
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Password fields */
    input[type="password"] {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #0d0d1a;
      color: #f1f1f1;
      font-size: 1rem;
      width: 100%;
    }
    input[type="password"]:focus { outline: none; border-color: #e94560; }

    button {
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #e94560;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #c73a52; }
    .error { color: #e94560; font-size: 0.875rem; min-height: 20px; margin: 0; }
  </style>
</head>
<body>
  <h1>Heimdal</h1>
  <p class="subtitle">First-run setup</p>

  <form id="form">
    <div class="field">
      <span class="field-label">Setup token</span>
      <div class="token-input" id="token-input">
        <label for="token" class="sr-only">Setup token</label>
        <div class="token-row">
          <div class="token-group">
            <div class="token-box"></div>
            <div class="token-box"></div>
            <div class="token-box"></div>
            <div class="token-box"></div>
          </div>
          <span class="token-sep">-</span>
          <div class="token-group">
            <div class="token-box"></div>
            <div class="token-box"></div>
            <div class="token-box"></div>
            <div class="token-box"></div>
          </div>
        </div>
        <div class="token-row">
          <div class="token-group">
            <div class="token-box"></div>
            <div class="token-box"></div>
            <div class="token-box"></div>
            <div class="token-box"></div>
          </div>
          <span class="token-sep">-</span>
          <div class="token-group">
            <div class="token-box"></div>
            <div class="token-box"></div>
            <div class="token-box"></div>
            <div class="token-box"></div>
          </div>
        </div>
        <input type="text" id="token" maxlength="16" inputmode="text" autocomplete="off" spellcheck="false" />
      </div>
      <span class="hint">Find your token in the server logs: <code>docker logs heimdal</code></span>
    </div>

    <div class="field">
      <label class="field-label" for="password">Password</label>
      <input type="password" id="password" minlength="12" required autocomplete="new-password" />
      <span class="hint">Minimum 12 characters</span>
    </div>

    <div class="field">
      <label class="field-label" for="confirm">Confirm password</label>
      <input type="password" id="confirm" required autocomplete="new-password" />
    </div>

    <p class="error" id="error"></p>
    <button type="submit">Set up Heimdal</button>
  </form>


  <script>
    fetch('/api/status')
      .then(r => r.json())
      .then(data => { if (data.configured) window.location.replace('/login.html'); });

    // A single real <input> drives the 16 visual .token-box cells (see
    // the CSS comment above) — it sits transparently on top of them and
    // captures typing, paste, and autofill; syncBoxes() mirrors its
    // value into the boxes on every change.
    const tokenInput = document.getElementById('token-input');
    const boxes = Array.from(tokenInput.querySelectorAll('.token-box'));
    const realInput = document.getElementById('token');

    function syncBoxes() {
      const val = realInput.value;
      boxes.forEach((box, i) => { box.textContent = val[i] || ''; });
    }
    realInput.addEventListener('focus', () => tokenInput.classList.add('focused'));
    realInput.addEventListener('blur', () => tokenInput.classList.remove('focused'));
    realInput.addEventListener('input', () => {
      realInput.value = realInput.value.replace(/[^A-Fa-f0-9]/g, '').toUpperCase().slice(0, 16);
      syncBoxes();
    });

    function getToken() {
      return realInput.value;
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = getToken();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';

      if (token.length !== 16) {
        errorEl.textContent = 'Please enter the complete setup token.';
        realInput.focus();
        return;
      }

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        return;
      }

      const res = await fetch('/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });

      if (res.ok) {
        window.location.replace('/login.html?next=/totp-prompt.html');
      } else {
        const data = await res.json();
        errorEl.textContent = data.error || 'Setup failed.';
        realInput.value = '';
        syncBoxes();
        realInput.focus();
      }
    });
  </script>
</body>
</html>
