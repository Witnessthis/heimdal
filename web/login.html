<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Heimdal — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Philosopher:wght@700&display=swap" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #1a1a2e;
      color: #f1f1f1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 { font-size: 2.8rem; margin: 0 0 4px; color: #e94560; font-family: 'Philosopher', serif; letter-spacing: 0.05em; }
    .subtitle { color: #aaa; margin: 0 0 32px; }
    form { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 0.875rem; color: #ccc; }
    input[type="password"] {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #0d0d1a;
      color: #f1f1f1;
      font-size: 1rem;
      width: 100%;
    }
    input[type="password"]:focus { outline: none; border-color: #e94560; }
    button {
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #e94560;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #c73a52; }
    .error { color: #e94560; font-size: 0.875rem; min-height: 20px; margin: 0; }

    /* TOTP digit boxes */
    .code-input { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .code-input input {
      height: 52px;
      text-align: center;
      font-family: monospace;
      font-size: 1.3rem;
      font-weight: 600;
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f1f1f1;
      caret-color: #e94560;
      padding: 0;
      width: 100%;
    }
    .code-input input:focus { outline: none; border-color: #e94560; }
    .hint { font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>
  <h1>Heimdal</h1>
  <p class="subtitle" id="subtitle">Sign in</p>

  <!-- Step 1: password -->
  <form id="password-form" style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px;">
    <label>
      Password
      <input type="password" id="password" required autocomplete="current-password" />
    </label>
    <p class="error" id="password-error"></p>
    <button type="submit">Sign in</button>
  </form>

  <!-- Step 2: TOTP code -->
  <form id="totp-form" style="width:100%;max-width:360px;display:none;flex-direction:column;gap:16px;">
    <p class="hint" style="margin:0;">Enter the 6-digit code from your authenticator app.</p>
    <div class="code-input" id="code-input"></div>
    <p class="error" id="totp-error"></p>
    <button type="submit">Verify</button>
  </form>

  <script>
    let pendingToken = null;
    const nextUrl = new URLSearchParams(window.location.search).get('next') || '/';

    // Redirect if already authenticated or not yet configured
    Promise.all([fetch('/api/me'), fetch('/api/status').then(r => r.json())])
      .then(([meRes, status]) => {
        if (meRes.status === 200) window.location.replace('/');
        else if (!status.configured) window.location.replace('/setup.html');
      });

    // Build 6 digit boxes
    const codeInput = document.getElementById('code-input');
    for (let i = 0; i < 6; i++) {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.maxLength = 1;
      inp.inputMode = 'numeric';
      inp.autocomplete = i === 0 ? 'one-time-code' : 'off';
      codeInput.appendChild(inp);
    }
    const digitInputs = Array.from(codeInput.querySelectorAll('input'));

    digitInputs.forEach((input, i) => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && i > 0) {
          digitInputs[i - 1].focus();
          digitInputs[i - 1].value = '';
          e.preventDefault();
        }
      });
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = val.slice(0, 1);
        if (val && i < digitInputs.length - 1) digitInputs[i + 1].focus();
      });
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const chars = e.clipboardData.getData('text').replace(/[^0-9]/g, '').split('');
        chars.forEach((c, j) => { if (i + j < digitInputs.length) digitInputs[i + j].value = c; });
        digitInputs[Math.min(i + chars.length, digitInputs.length - 1)].focus();
      });
    });

    function getCode() { return digitInputs.map(i => i.value).join(''); }

    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('password-error');
      errorEl.textContent = '';

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });

      if (res.ok) {
        const data = await res.json();
        if (data.totpRequired) {
          pendingToken = data.pendingToken;
          document.getElementById('password-form').style.display = 'none';
          document.getElementById('totp-form').style.display = 'flex';
          document.getElementById('subtitle').textContent = 'Two-factor authentication';
          digitInputs[0].focus();
        } else {
          window.location.replace(nextUrl);
        }
      } else {
        errorEl.textContent = 'Incorrect password.';
      }
    });

    document.getElementById('totp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = getCode();
      const errorEl = document.getElementById('totp-error');
      errorEl.textContent = '';

      if (code.length !== 6) {
        errorEl.textContent = 'Please enter the complete 6-digit code.';
        return;
      }

      const res = await fetch('/api/login/totp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pendingToken, code }),
      });

      if (res.ok) {
        window.location.replace(nextUrl);
      } else {
        const data = await res.json();
        errorEl.textContent = data.error || 'Invalid code.';
        digitInputs.forEach(i => i.value = '');
        digitInputs[0].focus();
      }
    });
  </script>
</body>
</html>
