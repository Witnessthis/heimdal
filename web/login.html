<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Heimdal — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Philosopher:wght@700&display=swap" />

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1a1a2e" />
  <script type="module" src="./src/pwa.js"></script>

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Heimdal" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #1a1a2e;
      color: #f1f1f1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 { font-size: 2.8rem; margin: 0 0 4px; color: #e94560; font-family: 'Philosopher', serif; letter-spacing: 0.05em; }
    .subtitle { color: #aaa; margin: 0 0 32px; }
    form { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 0.875rem; color: #ccc; }
    input[type="password"] {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #0d0d1a;
      color: #f1f1f1;
      font-size: 1rem;
      width: 100%;
    }
    input[type="password"]:focus { outline: none; border-color: #e94560; }
    button {
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #e94560;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #c73a52; }
    .btn-ghost {
      background: transparent;
      border: 1px solid #333;
      color: #aaa;
      font-weight: 400;
      margin-top: 0;
    }
    .btn-ghost:hover { background: transparent; border-color: #555; color: #f1f1f1; }
    .error { color: #e94560; font-size: 0.875rem; min-height: 20px; margin: 0; }

    /* TOTP code — one real <input> drives 6 visible .code-box cells; a
       single field (not 6 maxlength=1 boxes) so autofill providers see
       a field that can actually hold the whole code — some skip
       offering a suggestion entirely for a 1-character field. */
    .code-input { position: relative; display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .code-box {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 1.3rem;
      font-weight: 600;
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f1f1f1;
    }
    .code-input.focused .code-box { border-color: #e94560; }
    .code-input input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      /* Not opacity: 0 — iOS Safari disables the text-selection/paste
         UI on elements it considers fully transparent that way. Hiding
         via color instead keeps the element "present" for paste while
         still showing nothing (the .code-box cells sit visually below). */
      color: transparent;
      caret-color: transparent;
      border: 0;
      outline: none;
      margin: 0;
      padding: 0;
      background: transparent;
      font-size: 16px; /* prevents iOS auto-zoom on focus */
    }
    .hint { font-size: 0.8rem; color: #888; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <h1>Heimdal</h1>
  <p class="subtitle" id="subtitle">Sign in</p>

  <!-- Step 1: password -->
  <form id="password-form" style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px;">
    <label>
      Password
      <input type="password" id="password" required autocomplete="current-password" />
    </label>
    <p class="error" id="password-error"></p>
    <button type="submit">Sign in</button>
  </form>

  <!-- Step 2: TOTP code -->
  <form id="totp-form" style="width:100%;max-width:360px;display:none;flex-direction:column;gap:16px;">
    <p class="hint" style="margin:0;">Enter the 6-digit code from your authenticator app.</p>
    <div class="code-input" id="code-input">
      <label for="totp" class="sr-only">One-time code</label>
      <div class="code-box"></div>
      <div class="code-box"></div>
      <div class="code-box"></div>
      <div class="code-box"></div>
      <div class="code-box"></div>
      <div class="code-box"></div>
      <input type="text" id="totp" name="totp" maxlength="6" autocomplete="one-time-code" />
    </div>
    <p class="error" id="totp-error"></p>
    <button type="submit">Verify</button>
    <button type="button" class="btn-ghost" id="totp-back-btn">Back</button>
  </form>

  <script>
    let pendingToken = null;
    const nextUrl = new URLSearchParams(window.location.search).get('next') || '/';

    // Redirect if already authenticated or not yet configured
    Promise.all([fetch('/api/me'), fetch('/api/status').then(r => r.json())])
      .then(([meRes, status]) => {
        if (meRes.status === 200) window.location.replace('/');
        else if (!status.configured) window.location.replace('/setup.html');
      });

    // A single real <input> drives the 6 visible .code-box cells (see
    // the CSS comment above) — it sits transparently on top of them and
    // captures typing, paste, and autofill; syncBoxes() mirrors its
    // value into the boxes on every change.
    const codeInput = document.getElementById('code-input');
    const boxes = Array.from(codeInput.querySelectorAll('.code-box'));
    const realInput = document.getElementById('totp');

    function syncBoxes() {
      const val = realInput.value;
      boxes.forEach((box, i) => { box.textContent = val[i] || ''; });
    }
    realInput.addEventListener('focus', () => codeInput.classList.add('focused'));
    realInput.addEventListener('blur', () => codeInput.classList.remove('focused'));
    realInput.addEventListener('input', () => {
      realInput.value = realInput.value.replace(/[^0-9]/g, '').slice(0, 6);
      syncBoxes();
      if (getCode().length === 6) attemptTotpVerify();
    });

    function getCode() { return realInput.value; }

    // Returns to step 1 — used both by the explicit Back button and
    // whenever the server tells us the pending TOTP session is no longer
    // usable (expired, or already consumed), since re-submitting a code
    // against a dead pendingToken can never succeed and previously just
    // left the user stuck on a TOTP form with no way out.
    function resetToPasswordStep(message) {
      pendingToken = null;
      realInput.value = '';
      syncBoxes();
      document.getElementById('totp-error').textContent = '';
      document.getElementById('totp-form').style.display = 'none';
      document.getElementById('password-form').style.display = 'flex';
      document.getElementById('subtitle').textContent = 'Sign in';
      const passwordInput = document.getElementById('password');
      passwordInput.value = '';
      document.getElementById('password-error').textContent = message || '';
      passwordInput.focus();
    }
    document.getElementById('totp-back-btn').addEventListener('click', () => resetToPasswordStep());

    // Auto-submits as soon as the 6th digit lands — no need to press
    // Enter or tap Verify. Guarded against double-firing since both the
    // input handler above and the form's submit event (Enter key while a
    // digit box is focused) can each try to trigger this for the same code.
    let totpVerifying = false;
    async function attemptTotpVerify() {
      const code = getCode();
      const errorEl = document.getElementById('totp-error');
      if (code.length !== 6 || totpVerifying) return;
      totpVerifying = true;
      errorEl.textContent = '';

      try {
        const res = await fetch('/api/login/totp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pendingToken, code }),
        });

        if (res.ok) {
          window.location.replace(nextUrl);
          return;
        }
        const data = await res.json();
        if (data.expired) {
          resetToPasswordStep(data.error || 'Session expired. Please sign in again.');
          return;
        }
        errorEl.textContent = data.error || 'Invalid code.';
        realInput.value = '';
        syncBoxes();
        realInput.focus();
      } finally {
        totpVerifying = false;
      }
    }

    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('password-error');
      errorEl.textContent = '';

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });

      if (res.ok) {
        const data = await res.json();
        if (data.totpRequired) {
          pendingToken = data.pendingToken;
          document.getElementById('password-form').style.display = 'none';
          document.getElementById('totp-form').style.display = 'flex';
          document.getElementById('subtitle').textContent = 'Two-factor authentication';
          realInput.focus();
        } else {
          window.location.replace(nextUrl);
        }
      } else {
        errorEl.textContent = 'Incorrect password.';
      }
    });

    document.getElementById('totp-form').addEventListener('submit', (e) => {
      e.preventDefault();
      if (getCode().length !== 6) {
        document.getElementById('totp-error').textContent = 'Please enter the complete 6-digit code.';
        return;
      }
      attemptTotpVerify();
    });
  </script>
</body>
</html>
