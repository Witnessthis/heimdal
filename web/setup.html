<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Heimdal — Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Philosopher:wght@700&display=swap" />

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1a1a2e" />
  <script type="module" src="./src/pwa.js"></script>

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Heimdal" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #1a1a2e;
      color: #f1f1f1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 { font-size: 2.8rem; margin: 0 0 4px; color: #e94560; font-family: 'Philosopher', serif; letter-spacing: 0.05em; }
    .subtitle { color: #aaa; margin: 0 0 32px; }
    form { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field-label { font-size: 0.875rem; color: #ccc; }
    .hint { font-size: 0.8rem; color: #888; }

    /* Token boxes */
    .token-input {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .token-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }
    .token-group {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    .token-group input {
      height: 48px;
      text-align: center;
      font-family: monospace;
      font-size: 1.1rem;
      font-weight: 600;
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f1f1f1;
      caret-color: #e94560;
      padding: 0;
      width: 100%;
    }
    .token-group input:focus { outline: none; border-color: #e94560; }
    .token-sep { color: #444; font-size: 1.5rem; font-weight: 300; }

    /* Password fields */
    input[type="password"] {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #0d0d1a;
      color: #f1f1f1;
      font-size: 1rem;
      width: 100%;
    }
    input[type="password"]:focus { outline: none; border-color: #e94560; }

    button {
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #e94560;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #c73a52; }
    .error { color: #e94560; font-size: 0.875rem; min-height: 20px; margin: 0; }
  </style>
</head>
<body>
  <h1>Heimdal</h1>
  <p class="subtitle">First-run setup</p>

  <form id="form">
    <div class="field">
      <span class="field-label">Setup token</span>
      <div class="token-input">
        <div class="token-row">
          <div class="token-group">
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
          </div>
          <span class="token-sep">-</span>
          <div class="token-group">
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
          </div>
        </div>
        <div class="token-row">
          <div class="token-group">
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
          </div>
          <span class="token-sep">-</span>
          <div class="token-group">
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
            <input class="char-input" type="text" maxlength="1" inputmode="text" autocomplete="off" spellcheck="false" />
          </div>
        </div>
      </div>
      <span class="hint">Find your token in the server logs: <code>docker logs heimdal</code></span>
    </div>

    <div class="field">
      <label class="field-label" for="password">Password</label>
      <input type="password" id="password" minlength="12" required autocomplete="new-password" />
      <span class="hint">Minimum 12 characters</span>
    </div>

    <div class="field">
      <label class="field-label" for="confirm">Confirm password</label>
      <input type="password" id="confirm" required autocomplete="new-password" />
    </div>

    <p class="error" id="error"></p>
    <button type="submit">Set up Heimdal</button>
  </form>


  <script>
    fetch('/api/status')
      .then(r => r.json())
      .then(data => { if (data.configured) window.location.replace('/login.html'); });

    const inputs = Array.from(document.querySelectorAll('.char-input'));

    inputs.forEach((input, i) => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && i > 0) {
          inputs[i - 1].focus();
          inputs[i - 1].value = '';
          e.preventDefault();
        }
      });

      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^A-Fa-f0-9]/g, '').toUpperCase();
        e.target.value = val.slice(0, 1);
        if (val && i < inputs.length - 1) inputs[i + 1].focus();
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const chars = e.clipboardData.getData('text').replace(/[^A-Fa-f0-9]/g, '').toUpperCase().split('');
        chars.forEach((char, j) => {
          if (i + j < inputs.length) inputs[i + j].value = char;
        });
        const next = Math.min(i + chars.length, inputs.length - 1);
        inputs[next].focus();
      });
    });

    function getToken() {
      return inputs.map(inp => inp.value).join('');
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = getToken();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';

      if (token.length !== 16) {
        errorEl.textContent = 'Please enter the complete setup token.';
        inputs.find(inp => !inp.value)?.focus();
        return;
      }

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        return;
      }

      const res = await fetch('/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });

      if (res.ok) {
        window.location.replace('/login.html?next=/totp-prompt.html');
      } else {
        const data = await res.json();
        errorEl.textContent = data.error || 'Setup failed.';
        inputs.forEach(inp => inp.value = '');
        inputs[0].focus();
      }
    });
  </script>
</body>
</html>
